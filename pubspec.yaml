name: run_art_app
description: "图案跑 - GPS Art 跑步应用"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Routing
  go_router: ^14.8.1
  
  # HTTP Client
  dio: ^5.8.0
  
  # Local Storage
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4
  
  # Utils
  json_annotation: ^4.9.0
  intl: ^0.20.2
  equatable: ^2.0.7
  
  # UI Components
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # Image/Icon
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true